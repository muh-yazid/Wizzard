#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      

  - path: /etc/profile.d/n8n-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash

      [ "$USER" != "root" ] && return
      [ -f /root/.n8n_installed ] && return

      clear
      echo "======================================"
      echo "      N8N FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""

      echo "[INFO] Menjalankan installer..."

      # 🚨 BLOCKING (WAJIB)
      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          echo "[INFO] Cek log di /var/log/"
          return
      fi

      for i in {1..60}; do
          RUNNING=$(docker ps --format '{{.Names}}' | grep -c n8n || true)

          if [ "$RUNNING" -ge 1 ]; then
              echo ""
              echo "[OK] n8n sudah running"
              break
          fi

          echo ""
          echo "[WAIT] n8n belum ready ($i/60)"
          sleep 2
      done

      if ! ss -lnt | grep -q ":5678"; then
          echo "[WARNING] Port 5678 belum terbuka!"
          return
      fi

      # ✅ MARK DONE (SETELAH BENAR2 SELESAI)
      touch /root/.n8n_installed

      # ✅ CLEANUP DI AKHIR (INI YANG SEBELUMNYA SALAH POSISI)
      rm -f /root/setup-vm.sh
      rm -f /root/get-docker.sh
      rm -f /root/n8n-installer.sh

      echo ""
      echo "[INFO] Installation N8N finished"
