#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_AAPANEL-SETUP.SH
      
  - path: /etc/profile.d/aapanel-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      [ "$USER" != "root" ] && return
      [ -f /root/.aapanel_installed ] && return

      clear
      echo "======================================"
      echo "   AAPANEL FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""
      echo "[INFO] Menjalankan installer..."
      echo ""

      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          return
      fi

      echo ""
      echo "[INFO] Verifikasi service aaPanel..."
      for i in {1..60}; do
          RUNNING=$(ps aux | grep 'BT-Panel' | grep -v grep)
          if [ -n "$RUNNING" ]; then
              echo "[OK] aaPanel sudah running"
              break
          fi
          echo "[WAIT] aaPanel belum ready ($i/60)"
          sleep 2
      done

      PANEL_PORT=$(cat /www/server/panel/data/port.pl 2>/dev/null || echo "")
      if [ -n "$PANEL_PORT" ]; then
          if ! ss -lnt | grep -q ":$PANEL_PORT"; then
              echo "[WARNING] Port $PANEL_PORT belum terbuka!"
              return
          fi
      fi

      touch /root/.aapanel_installed
      rm -f /root/setup-vm.sh

      echo ""
      echo "[INFO] Installation aaPanel finished"
