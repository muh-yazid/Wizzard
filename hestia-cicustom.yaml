#cloud-config
package_update: false
package_upgrade: false

write_files:
  # =========================
  # MAIN INSTALL SCRIPT (BASE64)
  # =========================
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_HESTIA-SETUP.SH
      
  # =========================
  # FIRST LOGIN TRIGGER
  # =========================
  - path: /etc/profile.d/hestia-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash

      # =========================
      # ONLY ROOT + INTERACTIVE
      # =========================
      [ "$USER" != "root" ] && return
      [[ $- != *i* ]] && return

      # =========================
      # PREVENT RE-RUN
      # =========================
      if [ -f /root/.hestia_installed ]; then
          return
      fi

      clear
      echo "======================================"
      echo "   HESTIA FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""
      echo "[INFO] Menjalankan installer..."
      echo ""

      # =========================
      # RUN INSTALLER
      # =========================
      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          return
      fi

      # =========================
      # WAIT PANEL READY (HESTIA)
      # =========================
      echo ""
      echo "[INFO] Verifikasi service Hestia..."

      for i in {1..60}; do
          if systemctl is-active hestia >/dev/null 2>&1; then
              echo "[OK] Hestia service sudah running"
              break
          fi
          echo "[WAIT] Hestia belum ready ($i/60)"
          sleep 2
      done

      # =========================
      # CHECK PORT
      # =========================
      PANEL_PORT="8083"

      if ss -lnt | grep -q ":$PANEL_PORT"; then
          echo "[OK] Port $PANEL_PORT sudah terbuka"
      else
          echo "[WARNING] Port $PANEL_PORT belum terbuka!"
      fi

      # =========================
      # MARK AS DONE
      # =========================
      touch /root/.hestia_installed

      # =========================
      # SELF DESTRUCT 🔥
      # =========================
      rm -f /etc/profile.d/hestia-first-login.sh
      rm -f /root/setup-vm.sh

      echo ""
      echo "[INFO] Installation hestia finished"
